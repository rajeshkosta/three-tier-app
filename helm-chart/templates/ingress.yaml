{{- if .Values.ingress.enabled }}

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: wanderlust-ingress

  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  rules:
  - host: {{ .Values.ingress.host }}

    http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3500

{{- end }}
