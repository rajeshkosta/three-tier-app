{{- if .Values.backend.enabled }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: {{ .Values.backend.replicaCount }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      strategy:
        type: {{ .Values.backend.strategy.type }}
        rollingUpdate:
          maxSurge: {{ .Values.backend.strategy.rollingUpdate.maxSurge }}
          maxUnavailable: {{ .Values.backend.strategy.rollingUpdate.maxUnavailable }}

      nodeSelector:
        {{- toYaml .Values.backend.nodeSelector | nindent 8 }}

      affinity:
        {{- toYaml .Values.backend.affinity | nindent 8 }}

      tolerations:
        {{- toYaml .Values.backend.tolerations | nindent 8 }}

      containers:
      - name: backend

        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"

        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}

        ports:
        - containerPort: {{ .Values.backend.service.port }}

        env:
        - name: NODE_ENV
          value: {{ .Values.backend.env.NODE_ENV | quote }}

        - name: PORT
          value: {{ .Values.backend.env.PORT | quote }}

        - name: MONGODB_URI
          value: {{ .Values.backend.env.MONGODB_URI | quote }}

        - name: REDIS_URL
          value: {{ .Values.backend.env.REDIS_URL | quote }}

        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}

        livenessProbe:
          {{- toYaml .Values.backend.livenessProbe | nindent 10 }}

        readinessProbe:
          {{- toYaml .Values.backend.readinessProbe | nindent 10 }}

{{- end }}


---


{{- if .Values.backend.enabled }}

apiVersion: v1
kind: Service

metadata:
  name: backend

spec:
  type: {{ .Values.backend.service.type }}

  selector:
    app: backend

  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: {{ .Values.backend.service.port }}

{{- end }}
