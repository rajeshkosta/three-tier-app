apiVersion: v1
kind: ConfigMap
metadata:
  name: config-map
  namespace: application
data:
  MONGO_HOST: "mongodb-headless.database.svc.cluster.local"
  MONGO_PORT: "27017"
  MONGO_DB: "test"
  NODE_ENV: "production"
  PORT: "3500"

  MONGO_URI: "mongodb://admin:admin123@mongodb-headless.database.svc.cluster.local:27017/test?authSource=admin&replicaSet=rs0"

---
apiVersion: v1
kind: Secret
metadata:
  name: secret-map
  namespace: application
type: Opaque
stringData:
  MONGO_USERNAME: admin
  MONGO_PASSWORD: admin123
  USE_DB_AUTH: "true"
