apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: newapp-ingress
  namespace: application
spec:
  ingressClassName: nginx

  rules:
  - host: newapp.local

    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-preview
            port:
              number: 80

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-svc
            port:
              number: 80
