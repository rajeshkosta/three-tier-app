apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tta-frontend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rajeshkosta/three-tier-app.git
    targetRevision: main
    path: k8s/frontend

  destination:
    server: https://kubernetes.default.svc
    namespace: application

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
