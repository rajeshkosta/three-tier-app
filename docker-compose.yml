version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: mongo_TTA
    volumes:
      - mongo_data:/data/db

  backend:
    image: localhost:8083/backend-tta:12
    container_name: backend_TTA
    expose:
      - "3500"
    environment:
      - MONGO_URI=mongodb://mongo:27017/test
    depends_on:
      - mongo

  frontend:
    image: localhost:8082/frontend-tta:12
    container_name: frontend_TTA
    expose:
      - "80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_TTA
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
